name: VivyShot

options:
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.2"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: QW4U57CXJX

schemes:
  VivyShot:
    build:
      targets:
        VivyShot: all
    test:
      targets:
        - name: VivyShotTests

targets:
  VivyShot:
    type: application
    platform: macOS
    deploymentTarget: "15.2"
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/VivyShot.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - framework: ../VivyShotKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: VivyShot
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_DEBUG_DYLIB: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.vivyshot.dev
          PRODUCT_NAME: VivyShotDev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.vivyshot

  VivyShotTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.2"
    sources:
      - path: Tests
    dependencies:
      - target: VivyShot
      - framework: ../VivyShotKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivyshot.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""

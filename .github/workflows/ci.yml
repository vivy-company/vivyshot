name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-quality:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vivyshot-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run strict clippy for portable core
        run: cargo clippy -p vivyshot-core --all-targets -- -D warnings
      - name: Run strict clippy for FFI adapter
        run: cargo clippy -p vivyshot-ffi --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace
      - name: Build Rust docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  ffi-header-drift:
    name: FFI Header Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Regenerate FFI header
        run: ./scripts/gen-ffi.sh
      - name: Verify generated header is committed
        run: git diff --exit-code ffi/vivyshot_core.h

  macos-build-test:
    name: macOS Build And Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build app
        run: xcodebuild -project macos/VivyShot.xcodeproj -scheme VivyShot -configuration Debug -destination "platform=macOS" build
      - name: Run tests
        run: xcodebuild -project macos/VivyShot.xcodeproj -scheme VivyShot -configuration Debug -destination "platform=macOS" test
